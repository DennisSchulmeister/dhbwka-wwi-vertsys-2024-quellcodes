<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 2em;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        h1, h2 {
            color: white;
            text-shadow: 0px 0px 2px rgba(0,0,0, 0.75);
        }
        .container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .service {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
            min-width: 250px;
        }
        .service h2 {
            margin-top: 0;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .response {
            margin-top: 15px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 4px;
            min-height: 30px;
        }
        .loading {
            color: #666;
        }
        .error {
            color: #d32f2f;
        }
        .success {
            color: #388e3c;
        }
    </style>
</head>
<body>
    <h1>Microservices Dashboard</h1>
    <div class="container">
        <div class="service">
            <h2>Microservice 1</h2>
            <button onclick="fetchService1()">Call /api/microservice1/hello</button>
            <div id="response1" class="response"></div>
        </div>
        <div class="service">
            <h2>Microservice 2</h2>
            <button onclick="fetchService2()">Call /api/microservice2/hello</button>
            <div id="response2" class="response"></div>
        </div>
    </div>

    <script>
        async function fetchService(endpoint, responseElementId) {
            const responseElement = document.getElementById(responseElementId);
            responseElement.textContent = "Loading...";
            responseElement.className = "response loading";

            try {
                const response = await fetch(endpoint);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                responseElement.textContent = data.text || "No text received";
                responseElement.className = "response success";
            } catch (error) {
                responseElement.textContent = `Error: ${error.message}`;
                responseElement.className = "response error";
            }
        }

        function fetchService1() {
            fetchService("/api/microservice1/hello", "response1");
        }

        function fetchService2() {
            fetchService("/api/microservice2/hello", "response2");
        }
    </script>
</body>
</html>
